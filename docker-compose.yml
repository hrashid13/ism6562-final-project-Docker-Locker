# ISM 6562 — Final Project: Docker Locker / AgriFlow Farming
# Full big-data stack: HDFS (data lake) + Spark standalone + Jupyter
#
# Stage 1  → namenode, datanode1, datanode2, jupyter (HDFS only, no Spark needed)
# Stage 2+ → bring up spark-master and spark-worker-1 as well
#
# Memory budget (target ≤ 8 GB total):
#   namenode          ~512 MB
#   datanode1/2       ~512 MB each
#   spark-master      ~512 MB
#   spark-worker-1    ~2 GB  (executor memory)
#   jupyter           ~1 GB
#   ─────────────────────────
#   Total             ~5 GB  (comfortable on 8 GB; fine on 16 GB)
#
# Usage:
#   docker compose up -d
#   NameNode Web UI  → http://localhost:9870
#   Spark Master UI  → http://localhost:8080
#   Jupyter          → http://localhost:8888?token=agriflow
services:
  namenode:
    image: tcsmith314/hadoop-namenode-python311:latest
    container_name: agriflow-namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=agriflow-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network

  datanode:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: agriflow-datanode
    hostname: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - namenode

  spark-master:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    image: ism6562/spark-jovyan:3.5.0
    container_name: agriflow-spark-master
    hostname: spark-master
    command: bash -lc "/usr/local/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - PYSPARK_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - namenode
      - datanode

  spark-worker-1:
    image: ism6562/spark-jovyan:3.5.0
    container_name: agriflow-spark-worker-1
    hostname: spark-worker-1
    command: >
      bash -lc "mkdir -p /tmp/spark-work &&
      /usr/local/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      --webui-port 8081
      --work-dir /tmp/spark-work
      spark://spark-master:7077"
    ports:
      - "8081:8081"
    environment:
      - PYSPARK_PYTHON=/opt/conda/bin/python3
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - spark-master

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: agriflow-jupyter
    hostname: agriflow-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=agriflow
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - PYSPARK_PYTHON=/opt/conda/bin/python3
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - spark-master
      - namenode

volumes:
  namenode_data:
  datanode_data:

networks:
  agriflow-network:
    driver: bridge
