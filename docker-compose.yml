# ISM 6562 — Final Project: Docker Locker / AgriFlow Farming
# Full big-data stack: HDFS (data lake) + Spark standalone + Jupyter
#
# Stage 1  → namenode, datanode1, datanode2, jupyter (HDFS only, no Spark needed)
# Stage 2+ → bring up spark-master and spark-worker-1 as well
#
# Memory budget (target ≤ 8 GB total):
#   namenode          ~512 MB
#   datanode1/2       ~512 MB each
#   spark-master      ~512 MB
#   spark-worker-1    ~2 GB  (executor memory)
#   jupyter           ~1 GB
#   ─────────────────────────
#   Total             ~5 GB  (comfortable on 8 GB; fine on 16 GB)
#
# Usage:
#   docker compose up -d
#   NameNode Web UI  → http://localhost:9870
#   Spark Master UI  → http://localhost:8080
#   Jupyter          → http://localhost:8888?token=agriflow

services:

  # ============================================================
  # HDFS — NameNode
  # ============================================================
  # Manages the filesystem namespace and block locations.
  # Web UI at 9870 shows cluster health, datanodes, and file browser.

  namenode:
    image: tcsmith314/hadoop-namenode-python311:latest
    container_name: agriflow-namenode
    hostname: namenode
    ports:
      - "9870:9870"   # NameNode Web UI
      - "9000:9000"   # HDFS RPC (Spark + HDFS CLI connect here)
    environment:
      - CLUSTER_NAME=agriflow-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_webhdfs_enabled=true
      # Replication=2 matches our 2-datanode setup; justification in notebook
      - HDFS_CONF_dfs_replication=2
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/data                  # local data dir mounted for easy hdfs -put
    networks:
      - agriflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # HDFS — DataNode 1
  # ============================================================

  datanode1:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: agriflow-datanode1
    hostname: datanode1
    ports:
      - "9864:9864"   # DataNode 1 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - agriflow-network
    depends_on:
      namenode:
        condition: service_healthy

  # ============================================================
  # HDFS — DataNode 2
  # ============================================================

  datanode2:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: agriflow-datanode2
    hostname: datanode2
    ports:
      - "9865:9864"   # DataNode 2 Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - agriflow-network
    depends_on:
      namenode:
        condition: service_healthy

  # ============================================================
  # Spark — Master
  # ============================================================
  # Standalone cluster manager. Workers register here; drivers
  # submit jobs here. Used from Stage 2 onward.
spark-master:
  build:
    context: ./docker
    dockerfile: Dockerfile.spark
  image: ism6562/spark-jovyan:3.5.0
  container_name: agriflow-spark-master
  hostname: spark-master
  command: /usr/local/spark/bin/spark-class org.apache.spark.deploy.master.Master
  ports:
    - "8080:8080"
    - "7077:7077"
    - "4040:4040"
  environment:
    - SPARK_MODE=master
    - SPARK_MASTER_HOST=spark-master
    - SPARK_MASTER_PORT=7077
    - SPARK_MASTER_WEBUI_PORT=8080
    - PYSPARK_PYTHON=/opt/conda/bin/python3
  volumes:
    - ./notebooks:/home/jovyan/notebooks
    - ./data:/home/jovyan/data
  networks:
    - agriflow-network

spark-worker-1:
  image: ism6562/spark-jovyan:3.5.0
  container_name: agriflow-spark-worker-1
  hostname: spark-worker-1
  command: /usr/local/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
  ports:
    - "8081:8081"
  environment:
    - SPARK_MODE=worker
    - SPARK_MASTER_URL=spark://spark-master:7077
    - SPARK_WORKER_CORES=2
    - SPARK_WORKER_MEMORY=2g
    - SPARK_WORKER_WEBUI_PORT=8081
    - PYSPARK_PYTHON=/opt/conda/bin/python3
  volumes:
    - spark_worker_data:/home/jovyan/work
    - ./data:/home/jovyan/data
  networks:
    - agriflow-network
  depends_on:
    - spark-master

jupyter:
  image: jupyter/pyspark-notebook:spark-3.5.0
  container_name: agriflow-jupyter
  hostname: agriflow-jupyter
  ports:
    - "8888:8888"
  environment:
    - JUPYTER_TOKEN=agriflow
    - SPARK_MASTER=spark://spark-master:7077
    - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
    - PYSPARK_PYTHON=/opt/conda/bin/python3
    - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
  volumes:
    - ./notebooks:/home/jovyan/notebooks
    - ./data:/home/jovyan/data
    - jupyter_data:/home/jovyan/work
  networks:
    - agriflow-network
  depends_on:
    - namenode
    - spark-master

  # ============================================================
  # Spark — Worker 1
  # ============================================================
  # Single worker keeps memory footprint low while still allowing
  # Spark jobs to run. Increase SPARK_WORKER_MEMORY if you have
  # 16 GB available.

  spark-worker-1:
    image: ism6562/spark-jovyan:3.5.0
    container_name: agriflow-spark-worker-1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"   # Worker UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
      - PYSPARK_PYTHON=/opt/miniconda/bin/python3
    volumes:
      - spark_worker_data:/opt/spark/work-dir
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      spark-master:
        condition: service_healthy

  # ============================================================
  # Jupyter — PySpark Notebook
  # ============================================================
  # Pre-configured PySpark environment. Connects to both HDFS
  # (via namenode:9000) and Spark (via spark://spark-master:7077).
  #
  # Access: http://localhost:8888?token=agriflow

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: agriflow-jupyter
    hostname: agriflow-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=agriflow
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      # Match executor Python version to driver to avoid pickle errors
      - PYSPARK_PYTHON=/opt/miniconda/bin/python3
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - jupyter_data:/home/jovyan/work
    networks:
      - agriflow-network
    depends_on:
      namenode:
        condition: service_healthy
      spark-master:
        condition: service_healthy

networks:
  agriflow-network:
    driver: bridge

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  spark_worker_data:
  jupyter_data:
