# ISM 6562 — Final Project: Docker Locker / AgriFlow Farming
# Full big-data stack: HDFS (data lake) + Spark standalone + Jupyter
#
# Stage 1  → namenode, datanode1, datanode2, jupyter (HDFS only, no Spark needed)
# Stage 2+ → bring up spark-master and spark-worker-1 as well
#
# Memory budget (target ≤ 8 GB total):
#   namenode          ~512 MB
#   datanode1/2       ~512 MB each
#   spark-master      ~512 MB
#   spark-worker-1    ~2 GB  (executor memory)
#   jupyter           ~1 GB
#   ─────────────────────────
#   Total             ~5 GB  (comfortable on 8 GB; fine on 16 GB)
#
# Usage:
#   docker compose up -d
#   NameNode Web UI  → http://localhost:9870
#   Spark Master UI  → http://localhost:8080
#   Jupyter          → http://localhost:8888?token=agriflow
services:
  namenode:
    image: tcsmith314/hadoop-namenode-python311:latest
    container_name: agriflow-namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=agriflow-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network

  datanode:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: agriflow-datanode
    hostname: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - namenode

  spark-master:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    image: ism6562/spark-jovyan:3.5.0
    container_name: agriflow-spark-master
    hostname: spark-master
    command: bash -lc "/usr/local/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - PYSPARK_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - namenode
      - datanode

  spark-worker-1:
    image: ism6562/spark-jovyan:3.5.0
    container_name: agriflow-spark-worker-1
    hostname: spark-worker-1
    command: >
      bash -lc "mkdir -p /tmp/spark-work &&
      /usr/local/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      --webui-port 8081
      --work-dir /tmp/spark-work
      spark://spark-master:7077"
    ports:
      - "8081:8081"
    environment:
      - PYSPARK_PYTHON=/opt/conda/bin/python3
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - spark-master

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: agriflow-jupyter
    hostname: agriflow-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=agriflow
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - PYSPARK_PYTHON=/opt/conda/bin/python3
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
    networks:
      - agriflow-network
    depends_on:
      - spark-master
      - namenode
      - kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: agriflow-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    mem_limit: 512m
    networks:
      - agriflow-network
  
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: agriflow-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    mem_limit: 1g
    networks:
      - agriflow-network
    depends_on:
      - zookeeper

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agriflow-network

  airflow-init:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    image: ism6562/airflow-spark:2.8.1
    container_name: airflow-init
    user: "1000:0"
    entrypoint: /bin/bash
    command:
      - "-c"
      - "airflow db migrate && airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      HOME: /home/airflow
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - airflow-logs:/opt/airflow/logs
    networks:
      - agriflow-network

  airflow-webserver:
    image: ism6562/airflow-spark:2.8.1
    container_name: airflow-webserver
    user: "1000:0"
    command: airflow webserver
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      HOME: /home/airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
    networks:
      - agriflow-network

  airflow-scheduler:
    image: ism6562/airflow-spark:2.8.1
    container_name: airflow-scheduler
    user: "1000:0"
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      HOME: /home/airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
    networks:
      - agriflow-network
  
volumes:
  namenode_data:
  datanode_data:
  postgres-data:
  airflow-logs:

networks:
  agriflow-network:
    driver: bridge
